name: Bug report
description: Report a reproducible problem.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.1.0 or git commit SHA"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, install method"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Keep this small and do not include secrets, tokens, or private data.
    validations:
      required: true
